name: Save File to Repo

on:
  push:
    branches:
      - main  # Или название твоей основной ветки
  workflow_dispatch: # Позволяет запускать вручную

jobs:
  save_file_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Обязательно: даем права на запись в репозиторий

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create a file
        run: |
          echo "Этот текст будет в файле" > myfile.txt
          echo "Дата создания: $(date)" >> myfile.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          git add myfile.txt
          # Проверяем, есть ли изменения, чтобы не упасть с ошибкой, если файл не изменился
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-save file" && git push)
