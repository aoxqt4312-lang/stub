name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Prepare Keystore
        run: |
          if [ ! -f "my-release-key.jks" ]; then
            echo "Ключа нет, генерирую..."
            keytool -genkey -v -keystore my-release-key.jks \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias my-key-alias -storepass mypassword -keypass mypassword \
              -dname "CN=Android, O=Android, C=US"
          else
            echo "Ключ уже существует, использую его."
          fi

      - name: Build and Sign Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/my-release-key.jks \
            -Pandroid.injected.signing.store.password=mypassword \
            -Pandroid.injected.signing.key.alias=my-key-alias \
            -Pandroid.injected.signing.key.password=mypassword

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
