name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # 1. Создаем ключ, если его нет, и пушим в репо
      - name: Prepare Keystore
        run: |
          if [ ! -f "app/release.jks" ]; then
            keytool -genkeypair -v \
              -keystore app/release.jks \
              -alias mykeyalias \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass mypassword \
              -keypass mypassword \
              -dname "CN=Android, O=Android, C=US"
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@://github.com"
            git add app/release.jks
            git commit -m "Add keystore"
            git push
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 2. Сборка
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 3. Подпись и переименование в app-release.apk
      - name: Sign and Rename APK
        run: |
          # Находим любой сгенерированный APK
          RAW_APK=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          
          # Подписываем его и сохраняем сразу под именем app-release.apk
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks app/release.jks \
            --ks-pass pass:mypassword \
            --ks-key-alias mykeyalias \
            --key-pass pass:mypassword \
            --out app/build/outputs/apk/release/app-release.apk \
            "$RAW_APK"
          
          # Удаляем оригинал, если он назывался иначе, чтобы не путаться
          find app/build/outputs/apk/release/ -type f ! -name "app-release.apk" -delete

      # 4. Выгрузка
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
